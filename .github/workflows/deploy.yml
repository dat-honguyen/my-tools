name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Space-separated list of MFE projects to build and publish.
      # Add a new project name here as more remotes are added to the workspace.
      PROJECTS: hello-world
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build each remote under its own subpath
        run: |
          mkdir -p public
          for project in $PROJECTS; do
            npx ng build "$project" --base-href "/my-tools/$project/"
            cp -r "dist/$project/browser" "public/$project"
          done

      - uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
